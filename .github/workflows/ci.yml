name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: python -m pip install ruff
      - name: Ruff check
        run: make lint

  host-tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install host test dependencies
        run: python -m pip install -e ./controller[dev]
      - name: Run controller tests on host Python
        run: |
          cd controller
          python -m pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=65 \
            -v

  controller-tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Docker compose config
        run: |
          docker compose -f docker-compose.yml config >/tmp/compose-main.out
          docker compose -f docker-compose.yml -f docker-compose.isolation.yml config >/tmp/compose-isolation.out

      - name: Build controller image
        run: docker compose build controller

      - name: Run controller unit tests
        run: docker compose run --no-deps --rm controller python -m unittest discover -s tests -v

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [host-tests, controller-tests]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Run doctor smoke test
        run: DOCTOR_BUILD=1 ./scripts/doctor.sh

      - name: Run isolated session smoke test
        run: DOCTOR_BUILD=1 API_PORT=8010 ./scripts/smoke_isolated_session.sh
